[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "18"
  NODE_OPTIONS = "--max-old-space-size=8192"
  # Canonical site URL — used for metadata, canonical tags, sitemap and JSON-LD.
  NEXT_PUBLIC_SITE_URL = "https://autoecoledespaquerettes.fr"

# Next.js plugin for Netlify
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Force the canonical host: redirect www -> non-www (301)
[[redirects]]
  from = "https://www.autoecoledespaquerettes.fr/*"
  to = "https://autoecoledespaquerettes.fr/:splat"
  status = 301
  force = true

# Legacy blog path: /post/* -> /blog/* (301)
[[redirects]]
  from = "/post/*"
  to = "/blog/:splat"
  status = 301
  force = true

# Retitled post: keep the old indexed URL alive (301)
[[redirects]]
  from = "/blog/code-route-nouvelles-regles-2024"
  to = "/blog/code-route-nouvelles-regles-2026"
  status = 301
  force = true

# De-accented slug: redirect the old accented URL (percent-encoded over the wire) -> ASCII (301)
[[redirects]]
  from = "/blog/comment-g%C3%A9rer-son-stress-pour-r%C3%A9ussir-l-examen-de-conduite"
  to = "/blog/comment-gerer-son-stress-pour-reussir-l-examen-de-conduite"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.avif"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
